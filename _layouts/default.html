<header>
    <nav class="container">
        <div class="logo">DR <span>Website Design</span></div>
        
        <!-- Add this Hamburger Button -->
        <button class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <ul class="nav-links" id="nav-list">
            <li><a href="{{ '/' | relative_url }}">Home</a></li>
            <li><a href="{{ '/services' | relative_url }}">Services</a></li>
            <li><a href="{{ '/portfolio' | relative_url }}">Portfolio</a></li>
            <li><a href="{{ '/about' | relative_url }}">About</a></li>
            <li><a href="{{ '/' | relative_url }}#contact" class="btn-nav">Hire Us</a></li>
        </ul>
    </nav>
</header>

<!-- JavaScript to toggle the menu -->
<script>
    const menu = document.querySelector('#mobile-menu');
    const navList = document.querySelector('#nav-list');

    menu.addEventListener('click', function() {
        menu.classList.toggle('is-active');
        navList.classList.toggle('active');
    });
</script>
