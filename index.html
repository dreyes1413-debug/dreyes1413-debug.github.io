---
layout: default
title: Home
---
<section class="hero">
    <div class="container">
        <h1>We Build Websites That <span>Perform</span></h1>
        <p>Custom digital experiences for businesses that want to grow.</p>
        <a href="#contact" class="cta-button">Get a Free Quote</a>
    </div>
</section>

<section id="contact" class="contact">
    <div class="container">
        <h2>Contact Us</h2>
        <form action="https://formspree.io{{ site.email }}" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="_replyto" placeholder="Your Email" required>
            <textarea name="message" placeholder="Project Details" required></textarea>
            <button type="submit" class="cta-button">Send Message</button>
        </form>
    </div>
</section>
